name: offline_sos_system
description: A pure Dart, offline-first Flutter package for on-device crash and anomaly detection using hardware telemetry and TFLite.
version: 0.0.5
repository: https://github.com/bhagyaprasad92/offline_sos_system

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^7.0.0
  tflite_flutter: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/crash_model.tflite
